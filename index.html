<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion d'Entretien Véhicule</title>
    <style>
        /* Les couleurs et variables du design */
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --input-bg: #ffffff;
            --fixed-bg: #f1f5f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 800px;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.8rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .section-title {
            grid-column: 1 / -1;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary-color);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
        }

        input, textarea, select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--input-bg);
            font-size: 1rem;
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        /* Style spécial pour les données fixes */
        .fixed-data input {
            background-color: var(--fixed-bg);
            font-weight: 600;
            color: var(--primary-color);
            border-style: dashed;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn-submit {
            grid-column: 1 / -1;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 1.5rem;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        /* Responsive design pour les téléphones */
        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Fiche d'Intervention</h1>
            <p>Saisissez les informations du véhicule et les détails de l'entretien</p>
        </div>

        <form>
            <div class="form-grid">
                
                <div class="section-title">1. Informations Véhicule (Identifiants)</div>
                
                <div class="form-group fixed-data">
                    <label for="matricule">Matricule</label>
                    <input type="text" id="matricule" placeholder="Ex: 12345-A-1" required>
                </div>
                
                <div class="form-group fixed-data">
                    <label for="vehicule">Véhicule (Marque / Modèle)</label>
                    <input type="text" id="vehicule" placeholder="Ex: Dacia Logan, VW Golf..." required>
                </div>

                <div class="section-title">2. Détails de l'Entretien (Nouvelle Visite)</div>

                <div class="form-group">
                    <label for="client">Nom du Client</label>
                    <input type="text" id="client" placeholder="Ex: Ahmed Alaoui" required>
                </div>

                <div class="form-group">
                    <label for="date">Date de l'intervention</label>
                    <input type="date" id="date" required>
                </div>

                <div class="form-group">
                    <label for="kilometrage">Kilométrage Actuel</label>
                    <input type="number" id="kilometrage" placeholder="Ex: 85000" required>
                </div>

                <div class="form-group">
                    <label for="technicien">Technicien en charge</label>
                    <input type="text" id="technicien" placeholder="Nom du mécanicien" required>
                </div>

                <div class="form-group full-width">
                    <label for="entretien">Entretien / Travaux effectués</label>
                    <input type="text" id="entretien" placeholder="Ex: Vidange complète, Changement des plaquettes..." required>
                </div>

                <div class="form-group full-width">
                    <label for="note">Notes / Observations</label>
                    <textarea id="note" placeholder="Remarques sur l'état de la voiture, prochaines choses à changer..."></textarea>
                </div>

                <button type="button" class="btn-submit">Enregistrer l'Intervention</button>

            </div>
        </form>
    </div>

</body>
</html>
