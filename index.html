<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garage Pro - Cloud Galaxy Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --bg-color: #f8fafc;
            --gradient-1: #c7d2fe;
            --gradient-2: #fbcfe8;
            --gradient-3: #bbf7d0;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-color: #0f172a;
            --accent: #4f46e5;
            --input-bg: rgba(255, 255, 255, 0.9);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }

        [data-theme="dark"] {
            --bg-color: #020617;
            --gradient-1: #1e1b4b;
            --gradient-2: #3b0764;
            --gradient-3: #064e3b;
            --glass-bg: rgba(15, 23, 42, 0.75);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-color: #f8fafc;
            --accent: #818cf8;
            --input-bg: rgba(30, 41, 59, 0.8);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; transition: all 0.3s ease; }
        
        body { 
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 20% 20%, var(--gradient-1) 0px, transparent 50%),
                radial-gradient(at 80% 10%, var(--gradient-2) 0px, transparent 50%),
                radial-gradient(at 40% 80%, var(--gradient-3) 0px, transparent 50%);
            background-size: 200% 200%;
            animation: auroraBG 15s ease-in-out infinite alternate;
            background-attachment: fixed; 
            min-height: 100vh; 
            color: var(--text-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
        }

        @keyframes auroraBG { 0% { background-position: 0% 0%; } 50% { background-position: 100% 100%; } 100% { background-position: 0% 50%; } }

        .hidden { display: none !important; }

        /* Dashboard Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--input-bg); padding: 15px; border-radius: 20px; border: 1px solid var(--glass-border); text-align: center; box-shadow: var(--shadow); }
        .stat-card i { font-size: 1.2rem; color: var(--accent); margin-bottom: 5px; }
        .stat-card h4 { font-size: 0.75rem; opacity: 0.7; text-transform: uppercase; margin-bottom: 5px; }
        .stat-card p { font-size: 1.5rem; font-weight: 800; color: var(--accent); }

        /* Filter Box */
        .filter-box { background: var(--glass-bg); padding: 15px; border-radius: 20px; border: 1px solid var(--glass-border); margin-bottom: 25px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: center; }
        .filter-box input { width: auto; padding: 8px 12px; font-size: 0.85rem; }

        #login-screen { width: 100%; max-width: 400px; }
        .login-card { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); padding: 2.5rem; border-radius: 30px; box-shadow: var(--shadow); text-align: center; }
        .login-card h2 { margin-bottom: 1.5rem; font-size: 1.8rem; font-weight: 800; background: linear-gradient(to right, var(--accent), #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-card input { width: 100%; padding: 12px 20px; border-radius: 15px; border: 1px solid var(--glass-border); background: var(--input-bg); color: var(--text-color); margin-bottom: 1rem; outline: none; text-align: center; font-size: 1.1rem; }
        
        #app-content { width: 100%; max-width: 1100px; display: none; flex-direction: column; gap: 20px; align-self: flex-start; }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); padding: 2rem; border-radius: 30px; box-shadow: var(--shadow); }

        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .user-tag { background: var(--accent); color: white; padding: 5px 15px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }

        .btn-action { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; justify-content: center; }
        .btn-action:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4); }
        .btn-import { background: #10b981; margin-bottom: 20px; font-size: 0.85rem; padding: 10px 15px; }
        .btn-delete-multi { background: #ff4d4d; font-size: 0.85rem; padding: 8px 15px; margin-bottom: 10px; }
        .btn-logout { background: #ff4d4d; padding: 8px 15px; border-radius: 12px; font-size: 0.8rem; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1rem; }
        .menu-item { background: var(--input-bg); padding: 2rem; border-radius: 25px; text-align: center; cursor: pointer; border: 1px solid var(--glass-border); }
        .menu-item:hover { border-color: var(--accent); transform: scale(1.03); }
        .menu-item i { font-size: 2rem; margin-bottom: 10px; color: var(--accent); display: block; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 1.5rem; }
        .full { grid-column: span 2; }
        label { font-size: 0.8rem; font-weight: 600; opacity: 0.8; margin-bottom: 5px; display: block;}
        input, textarea, select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--glass-border); background: var(--input-bg); color: var(--text-color); outline: none; }
        
        .search-controls { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 15px; }
        .search-box-wrapper { flex: 1; min-width: 200px; position: relative; }
        .search-box-wrapper input { padding-left: 40px; }
        .search-box-wrapper i { position: absolute; left: 15px; top: 15px; opacity: 0.5; }

        .date-filter-wrapper { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; background: var(--glass-bg); padding: 5px 15px; border-radius: 15px; border: 1px solid var(--glass-border); }
        .date-filter-wrapper input { padding: 8px 12px; width: auto; font-size: 0.85rem; }

        .table-container { overflow-x: auto; margin-top: 1rem; border-radius: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { text-align: left; padding: 15px; font-size: 0.7rem; text-transform: uppercase; color: var(--accent); border-bottom: 2px solid var(--glass-border); }
        td { padding: 15px; border-bottom: 1px solid var(--glass-border); font-size: 0.85rem; }
        
        .action-btns { display: flex; gap: 12px; align-items: center; }
        .edit-btn { color: #4f46e5; cursor: pointer; background: none; border: none; font-size: 1.1rem; }
        .delete-btn { color: #ff4d4d; cursor: pointer; background: none; border: none; font-size: 1.1rem; }
        
        .row-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); }

        .view { display: none; }
        .active-view { display: block; animation: fadeInUp 0.4s ease forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Badge pour le nombre de résultats */
        .results-badge { background: var(--accent); color: white; padding: 5px 12px; border-radius: 50px; font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body data-theme="light">

    <div id="login-screen">
        <div class="login-card">
            <h2><i class="fa-solid fa-gauge-high"></i> AutoManager</h2>
            <form id="login-form" onsubmit="checkPassword(event)">
                <input type="password" id="password-input" placeholder="Mot de passe" required>
                <div id="login-error" class="hidden" style="color:red; margin-bottom:10px;">Accès refusé.</div>
                <button type="submit" class="btn-action" style="width: 100%;">Se Connecter</button>
            </form>
        </div>
    </div>

    <div id="app-content">
        <div class="nav-bar">
            <div>
                <span id="role-badge" class="user-tag">Role</span>
                <button onclick="toggleTheme()" style="background:none; border:none; margin-left:10px; cursor:pointer; color:var(--text-color);"><i class="fa-solid fa-circle-half-stroke"></i></button>
            </div>
            <button class="btn-action btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Quitter</button>
        </div>

        <div class="glass-card">
            <div id="view-header" style="text-align: center; margin-bottom: 20px;">
                <h1 id="view-title">Tableau de Bord</h1>
                <p id="view-subtitle" style="opacity: 0.7;">Garage Lahcen Auto - Système Cloud</p>
            </div>

            <div id="v-home" class="view active-view">
                <div class="stats-grid">
                    <div class="stat-card"><i class="fa-solid fa-calendar-day"></i><h4>Aujourd'hui</h4><p id="stat-today">0</p></div>
                    <div class="stat-card"><i class="fa-solid fa-calendar-check"></i><h4>Ce Mois</h4><p id="stat-month">0</p></div>
                    <div class="stat-card"><i class="fa-solid fa-layer-group"></i><h4>Cette Année</h4><p id="stat-year">0</p></div>
                    <div class="stat-card" style="background: var(--accent); border:none;"><i class="fa-solid fa-database" style="color:white;"></i><h4 style="color:white; opacity:0.9;">Total</h4><p id="stat-total" style="color:white;">0</p></div>
                </div>

                <div class="filter-box">
                    <label>Filtrer :</label>
                    <input type="date" id="dash-start" onchange="calculateCustomStat()">
                    <span>au</span>
                    <input type="date" id="dash-end" onchange="calculateCustomStat()">
                    <div id="custom-res" class="user-tag" style="background:var(--input-bg); color:var(--accent); border:1px solid var(--accent);">Résultat: 0</div>
                </div>

                <div class="menu-grid">
                    <div class="menu-item" onclick="switchView('add')"><i class="fa-solid fa-plus-circle"></i><h3>Nouvel Entretien</h3></div>
                    <div class="menu-item" onclick="switchView('search')"><i class="fa-solid fa-magnifying-glass"></i><h3>Historique & Recherche</h3></div>
                </div>
            </div>

            <div id="v-add" class="view">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom:15px;">
                    <button class="btn-action" onclick="goHomeAndReset()" style="background:none; color:var(--accent); box-shadow:none;"><i class="fa-solid fa-arrow-left"></i> Retour</button>
                    <div id="import-section" class="hidden">
                        <input type="file" id="excel-file" class="hidden" onchange="handleExcelImport(event)">
                        <button class="btn-action btn-import" onclick="document.getElementById('excel-file').click()"><i class="fa-solid fa-file-excel"></i> Importer Excel</button>
                    </div>
                </div>
                <form id="maintenanceForm" class="form-grid">
                    <div class="full radio-group-container" style="display:flex; gap:15px; padding:10px; background:rgba(0,0,0,0.05); border-radius:10px;">
                        <label><input type="radio" name="mat_type" value="new" checked onchange="toggleMatriculeType()"> Nouveau</label>
                        <label><input type="radio" name="mat_type" value="existing" onchange="toggleMatriculeType()"> Existant</label>
                    </div>
                    <div class="form-group"><label>Matricule</label><input type="text" id="matricule" required><select id="matricule-select" class="hidden" onchange="fillVehicleInfo()"></select></div>
                    <div class="form-group"><label>Véhicule</label><input type="text" id="vehicule" required></div>
                    <div class="form-group"><label>Client</label><input type="text" id="client" required></div>
                    <div class="form-group"><label>Date</label><input type="date" id="date" required></div>
                    <div class="form-group"><label>Kilométrage</label><input type="number" id="km" required></div>
                    <div class="form-group">
                        <label>Technicien <span id="tech-admin-link" class="hidden" onclick="toggleTechAdmin()" style="cursor:pointer; text-decoration:underline;">[Gérer]</span></label>
                        <select id="tech" required></select>
                        <div id="tech-admin-box" class="tech-box hidden" style="padding:10px; border:1px dashed var(--accent); margin-top:5px;">
                            <input type="text" id="new-tech-name" placeholder="Nom">
                            <div style="display:flex; gap:5px; margin-top:5px;">
                                <button type="button" onclick="addTech()" class="btn-action" style="flex:1;">+</button>
                                <button type="button" onclick="removeTech()" class="btn-logout" style="flex:1;">-</button>
                            </div>
                        </div>
                    </div>
                    <div class="form-group full"><label>Détails</label><input type="text" id="entretien"></div>
                    <div class="form-group full"><label>Note</label><textarea id="note"></textarea></div>
                    <button type="submit" id="save-btn" class="btn-action full">Sauvegarder</button>
                </form>
            </div>

            <div id="v-search" class="view">
                <button class="btn-action" onclick="goHomeAndReset()" style="background:none; color:var(--accent); box-shadow:none; margin-bottom:15px;"><i class="fa-solid fa-arrow-left"></i> Retour</button>
                
                <div class="search-controls">
                    <div class="search-box-wrapper">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="globalSearch" placeholder="Rechercher..." onkeyup="renderTable()">
                    </div>
                    
                    <div class="date-filter-wrapper">
                        <label style="margin:0;"><i class="fa-regular fa-calendar-days"></i> Du :</label>
                        <input type="date" id="search-date-start" onchange="renderTable()">
                        <label style="margin:0;">Au :</label>
                        <input type="date" id="search-date-end" onchange="renderTable()">
                        <button class="btn-action" style="padding: 8px 12px; font-size: 0.8rem;" onclick="resetSearchDates()"><i class="fa-solid fa-rotate-right"></i></button>
                    </div>

                    <div style="display:flex; align-items:center; gap:10px;">
                        <label style="margin:0;">Afficher:</label>
                        <select id="pageLimit" style="width:100px; padding:5px;" onchange="renderTable()">
                            <option value="10">10</option>
                            <option value="20">20</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                            <option value="1000">1000</option>
                            <option value="all">Tout (ALL)</option>
                        </select>
                    </div>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div class="results-badge">
                        <i class="fa-solid fa-list-check"></i> Résultats affichés : <span id="displayed-count">0</span>
                    </div>
                    <button id="multi-delete-btn" class="btn-action btn-delete-multi hidden" onclick="deleteSelected()"><i class="fa-solid fa-trash-can"></i> Supprimer la sélection (<span id="select-count">0</span>)</button>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th style="width:40px;"><input type="checkbox" id="selectAll" class="row-checkbox" onchange="toggleSelectAll(this)"></th>
                                <th>Matricule</th>
                                <th>Client / Date</th>
                                <th>Entretien / Note</th>
                                <th>Tech</th>
                                <th id="th-actions" class="hidden">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="dataBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAVwCOEKZUSCPMurHWbgmRjQcQTWpAJ4kc",
            authDomain: "lahcen-auto.firebaseapp.com",
            databaseURL: "https://lahcen-auto-default-rtdb.firebaseio.com/",
            projectId: "lahcen-auto",
            storageBucket: "lahcen-auto.firebasestorage.app",
            messagingSenderId: "821702720115",
            appId: "1:821702720115:web:d5d85ffb1b06a0d2e94806"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'entretiens');
        const techRef = ref(db, 'techniciens');

        window.allData = [];
        window.vehiclesData = {};
        window.techMap = {};
        window.editingId = null;

        window.isSuperAdmin = () => (sessionStorage.getItem('user_role') || '').toUpperCase().replace('_', ' ').trim() === 'SUPER ADMIN';

        // Helper: Convert Excel Serial Date to YYYY-MM-DD
        function excelDateToJSDate(serial) {
            if (typeof serial !== 'number') return serial; // Already a string
            const date = new Date((serial - 25569) * 86400 * 1000);
            return date.toISOString().split('T')[0];
        }

        onValue(techRef, (snap) => {
            const s = document.getElementById('tech');
            s.innerHTML = '<option value="">-- Choisir --</option>';
            window.techMap = {};
            snap.forEach(c => {
                const name = c.val().name;
                window.techMap[name] = c.key;
                s.innerHTML += `<option value="${name}">${name}</option>`;
            });
        });

        window.addTech = () => {
            const n = document.getElementById('new-tech-name').value.trim();
            if(n) push(techRef, {name: n}).then(() => document.getElementById('new-tech-name').value = '');
        };

        window.removeTech = () => {
            const n = document.getElementById('tech').value;
            if(n && window.techMap[n]) {
                if(confirm(`Supprimer ${n} ?`)) remove(ref(db, 'techniciens/' + window.techMap[n]));
            }
        };

        window.loadData = function() {
            onValue(dbRef, (snap) => {
                window.allData = [];
                window.vehiclesData = {};
                snap.forEach(c => {
                    let item = c.val();
                    item.id = c.key;
                    window.allData.push(item);
                    if(!window.vehiclesData[item.matricule]) window.vehiclesData[item.matricule] = { v: item.vehicule, c: item.client };
                });
                renderTable();
                updateDashboardStats();
            });
        };

        window.renderTable = function() {
            const body = document.getElementById('dataBody');
            
            // Get filter values
            const query = document.getElementById('globalSearch').value.toLowerCase();
            const limit = document.getElementById('pageLimit').value;
            const startDate = document.getElementById('search-date-start').value;
            const endDate = document.getElementById('search-date-end').value;
            
            const admin = isSuperAdmin();
            
            body.innerHTML = "";
            document.getElementById('th-actions').classList.toggle('hidden', !admin);
            document.getElementById('tech-admin-link').classList.toggle('hidden', !admin);
            document.getElementById('import-section').classList.toggle('hidden', !admin);
            document.getElementById('selectAll').checked = false;
            updateSelectCount();

            // Filter logic (Text Match + Date Match)
            let filtered = window.allData.filter(d => {
                const textMatch = d.matricule.toLowerCase().includes(query) || 
                                  d.client.toLowerCase().includes(query) || 
                                  d.vehicule.toLowerCase().includes(query);
                
                let dateMatch = true;
                if (startDate && d.date < startDate) dateMatch = false;
                if (endDate && d.date > endDate) dateMatch = false;

                return textMatch && dateMatch;
            }).reverse();

            // Limit results
            let displayData = (limit === 'all') ? filtered : filtered.slice(0, parseInt(limit));

            // Update row counter
            document.getElementById('displayed-count').innerText = displayData.length;

            // Render Rows
            displayData.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><input type="checkbox" class="row-checkbox item-check" data-id="${item.id}" onchange="updateSelectCount()"></td>
                    <td><b>${item.matricule}</b><br><small>${item.vehicule}</small></td>
                    <td>${item.date}<br><b>${item.client}</b></td>
                    <td>${item.entretien || ''}<br><small>Note: ${item.note || '-'}</small><br><small>${item.km} KM</small></td>
                    <td>${item.tech}</td>
                    <td class="${admin ? '' : 'hidden'} action-btns">
                        <button class="edit-btn" onclick="editEntry('${item.id}')"><i class="fa-solid fa-pen"></i></button>
                        <button class="delete-btn" onclick="deleteEntry('${item.id}')"><i class="fa-solid fa-trash"></i></button>
                    </td>
                `;
                body.appendChild(tr);
            });
        };

        window.resetSearchDates = function() {
            document.getElementById('search-date-start').value = "";
            document.getElementById('search-date-end').value = "";
            window.renderTable();
        };

        window.deleteEntry = (id) => { if(confirm("Supprimer définitivement ?")) remove(ref(db, 'entretiens/' + id)); };

        window.deleteSelected = () => {
            const selected = Array.from(document.querySelectorAll('.item-check:checked')).map(cb => cb.dataset.id);
            if(selected.length > 0 && confirm(`Supprimer ${selected.length} lignes ?`)) {
                selected.forEach(id => remove(ref(db, 'entretiens/' + id)));
                alert("Terminé");
            }
        };

        window.editEntry = (id) => {
            const item = window.allData.find(d => d.id === id);
            if(!item) return;
            window.editingId = id;
            switchView('add');
            document.getElementById('matricule').value = item.matricule;
            document.getElementById('vehicule').value = item.vehicule;
            document.getElementById('client').value = item.client;
            document.getElementById('date').value = item.date;
            document.getElementById('km').value = item.km;
            document.getElementById('tech').value = item.tech;
            document.getElementById('entretien').value = item.entretien || '';
            document.getElementById('note').value = item.note || '';
            document.getElementById('save-btn').innerText = "Mettre à jour";
        };

        document.getElementById('maintenanceForm').onsubmit = (e) => {
            e.preventDefault();
            const data = {
                matricule: document.getElementById('matricule').value.toUpperCase(),
                vehicule: document.getElementById('vehicule').value,
                client: document.getElementById('client').value,
                date: document.getElementById('date').value,
                km: document.getElementById('km').value,
                tech: document.getElementById('tech').value,
                entretien: document.getElementById('entretien').value || "",
                note: document.getElementById('note').value || ""
            };
            if(window.editingId) update(ref(db, 'entretiens/' + window.editingId), data).then(goHomeAndReset);
            else push(dbRef, data).then(goHomeAndReset);
        };

        window.handleExcelImport = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (evt) => {
                const workbook = XLSX.read(evt.target.result, { type: 'binary' });
                const rows = XLSX.utils.sheet_to_row_object_array(workbook.Sheets[workbook.SheetNames[0]]);
                if(confirm(`Importer ${rows.length} lignes ?`)) {
                    rows.forEach(r => push(dbRef, {
                        matricule: (r.matricule || "").toString().toUpperCase(),
                        vehicule: r.véhicule || r.vehicule || "",
                        client: r.client || "",
                        date: excelDateToJSDate(r.date) || new Date().toISOString().split('T')[0],
                        km: r.kilométrage || r.kilometrage || 0,
                        tech: r.technicien || "Inconnu",
                        entretien: r.détails || r.details || "",
                        note: r.note || ""
                    }));
                }
            };
            reader.readAsBinaryString(file);
        };

        window.updateDashboardStats = function() {
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();

            document.getElementById('stat-today').innerText = window.allData.filter(d => d.date === todayStr).length;
            document.getElementById('stat-month').innerText = window.allData.filter(d => new Date(d.date).getMonth() === currentMonth && new Date(d.date).getFullYear() === currentYear).length;
            document.getElementById('stat-year').innerText = window.allData.filter(d => new Date(d.date).getFullYear() === currentYear).length;
            document.getElementById('stat-total').innerText = window.allData.length;

            const s = document.getElementById('matricule-select');
            s.innerHTML = '<option value="">-- Choisir --</option>';
            for(let m in window.vehiclesData) s.innerHTML += `<option value="${m}">${m}</option>`;
        };

        window.calculateCustomStat = function() {
            const start = document.getElementById('dash-start').value;
            const end = document.getElementById('dash-end').value;
            if(start && end) {
                const count = window.allData.filter(d => d.date >= start && d.date <= end).length;
                document.getElementById('custom-res').innerText = "Résultat: " + count;
            }
        };
    </script>

    <script>
        function checkPassword(e) {
            e.preventDefault();
            const pwd = document.getElementById('password-input').value;
            fetch('https://oulid-auto.alamiuness.workers.dev', { method: 'POST', body: JSON.stringify({ password: pwd }) })
            .then(r => r.json()).then(d => {
                if(d.success) {
                    sessionStorage.setItem('auth_token', 'true');
                    sessionStorage.setItem('user_role', d.role || 'ADMIN');
                    location.reload();
                } else document.getElementById('login-error').classList.remove('hidden');
            });
        }

        function switchView(v) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active-view'));
            document.getElementById('v-' + v).classList.add('active-view');
        }

        function goHomeAndReset() {
            window.editingId = null;
            document.getElementById('maintenanceForm').reset();
            document.getElementById('save-btn').innerText = "Sauvegarder";
            switchView('home');
        }

        function toggleMatriculeType() {
            const isEx = document.querySelector('input[name="mat_type"]:checked').value === 'existing';
            document.getElementById('matricule').classList.toggle('hidden', isEx);
            document.getElementById('matricule-select').classList.toggle('hidden', !isEx);
            document.getElementById('matricule').required = !isEx;
        }

        function fillVehicleInfo() {
            const m = document.getElementById('matricule-select').value;
            if(m && window.vehiclesData[m]) {
                document.getElementById('vehicule').value = window.vehiclesData[m].v;
                document.getElementById('client').value = window.vehiclesData[m].c;
            }
        }

        function toggleSelectAll(master) {
            document.querySelectorAll('.item-check').forEach(cb => cb.checked = master.checked);
            updateSelectCount();
        }

        function updateSelectCount() {
            const count = document.querySelectorAll('.item-check:checked').length;
            document.getElementById('select-count').innerText = count;
            document.getElementById('multi-delete-btn').classList.toggle('hidden', count === 0);
        }

        function toggleTheme() {
            const b = document.body;
            b.setAttribute('data-theme', b.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
        }

        function logout() { sessionStorage.clear(); location.reload(); }
        function toggleTechAdmin() { document.getElementById('tech-admin-box').classList.toggle('hidden'); }

        window.onload = () => {
            if(sessionStorage.getItem('auth_token') === 'true') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'flex';
                document.getElementById('role-badge').innerText = sessionStorage.getItem('user_role');
                if(window.loadData) window.loadData();
            }
        };
    </script>
</body>
</html>
